{% extends 'base.html' %}
{% block title %}
Companies Page
{% endblock %}
{% block content %}
<link rel="stylesheet" href="static/css/item.css">


<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="btn-create" data-toggle="modal" data-target="#insert_book">
    <span class="btn-icon">
      <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 1V11M1 6H11" stroke="#0e0e10" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </span>
    <span class="btn-label">Create New</span>
  </button>

  <div class="modal fade" id="insert_book" tabindex="-1" role="dialog" aria-labelledby="basicModal" aria-hidden="true">
      <div class="modal-dialog">
          <div class="modal-content">
              <div class="modal-header">
                  <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
                  <h4 class="modal-title" id="myModalLabel">Add a book</h4>
              </div>
              <form action="{{url_for('add_book')}}" method="post">
                  <div class="modal-body">
                      <div class="form-group row">
                          <label for="author" class="col-xs-2 control-label">Author</label>
                          <div class="col-xs-10">
                              <input type="text" id="author" class="form-control" name="author" placeholder="Author" />
                          </div>
                      </div>
                      <div class="form-group row">
                          <label for="author" class="col-xs-2 control-label">Title</label>
                          <div class="col-xs-10">
                              <input type="text" class="form-control" name="title" placeholder="Title" />
                          </div>
                      </div>
                      <div class="form-group row">
                          <label for="author" class="col-xs-2 control-label">Price</label>
                          <div class="col-xs-10">
                              <input type="number" class="form-control" name="price" placeholder="Price" />
                          </div>
                      </div>
                  </div>
                  <div class="modal-footer">
                      <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
                      <button type="submit" class="btn btn-success">Submit</button>
                  </div>
              </form>
          </div>
      </div>
  </div>

  <span class="filter-label">Filter</span>

  <!-- Search -->
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" type="text" placeholder="Search by name or tag…" />
  </div>

  <div class="divider"></div>
  <label>Country</label>
  <select id="filterCountries"></select>

  <!-- Category chips -->
  <label>Company Type</label>
  <div class="chip-group" id="category-chips"></div>

  <!-- Region chips -->
  <div class="divider"></div>

  <div id="results-count"><span id="count">0</span> results</div>
</div>

<!-- GRID -->
<div id="grid">
  <div id="empty">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    No results match your filters.
  </div>
</div>

<!-- Load data -->
<script src="static/js/company.js"></script>
</body>

{% endblock %}
